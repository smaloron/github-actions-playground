name: Build on my Mac

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Vérifier l'environnement
        run: |
          echo "Machine: $(hostname)"
          echo "OS: $(uname -s)"
          sw_vers

      - name: Installer les dépendances
        run: npm install

      - name: Lancer les tests
        run: npm test